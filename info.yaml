# Tiny Tapeout project information
project:
  title:        "4-bit Tiny CPU"
  author:       "Garv R Jain"
  discord:      ""
  description:  "A 4-bit accumulator-based CPU with ALU operations and branching support"
  language:     "Verilog"
  clock_hz:     100000000

  tiles: "1x1"

  top_module:  "tt_um_tiny4_cpu"

  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "Instruction bit 0"
  ui[1]: "Instruction bit 1"
  ui[2]: "Instruction bit 2"
  ui[3]: "Instruction bit 3"
  ui[4]: "Instruction bit 4"
  ui[5]: "Instruction bit 5"
  ui[6]: "Instruction bit 6"
  ui[7]: "Instruction bit 7"

  # Outputs
  uo[0]: "ACC[0]"
  uo[1]: "ACC[1]"
  uo[2]: "ACC[2]"
  uo[3]: "ACC[3]"
  uo[4]: "0"
  uo[5]: "0"
  uo[6]: "0"
  uo[7]: "0"

  # Bidirectional
  uio[0]: "PC[0]"
  uio[1]: "PC[1]"
  uio[2]: "PC[2]"
  uio[3]: "PC[3]"
  uio[4]: "Zero Flag"
  uio[5]: "Carry Flag"
  uio[6]: "Unused"
  uio[7]: "Unused"

yaml_version: 6
